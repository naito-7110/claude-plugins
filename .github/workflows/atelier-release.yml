name: atelier-release

on:
  push:
    tags:
      - "atelier/v*"

# supply-chain-security: トップレベルは無権限、必要なジョブにだけ最小権限を付与する。
permissions: {}

defaults:
  run:
    working-directory: tools/atelier

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # GitHub Release の作成・アセット添付に必要
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: tools/atelier/go.mod
          cache-dependency-path: tools/atelier/go.sum
      - name: Derive semver from tag (atelier/vX.Y.Z -> vX.Y.Z)
        id: version
        run: echo "version=${GITHUB_REF_NAME#atelier/}" >> "$GITHUB_OUTPUT"
      # goreleaser OSS はモノレポのタグ prefix(atelier/v*)を解釈できない
      # (Pro 機能)ため、同一コミットに semver のローカルタグを作って
      # GORELEASER_CURRENT_TAG で渡す。このタグは push しない(リモートに残らない)。
      - name: Create local semver tag for goreleaser
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: git tag -f "$VERSION"
      # publish は gh で行うため skip。validate はモノレポタグとローカルタグの
      # 併存を誤検知しうるため skip する(ビルド・checksum 生成には影響しない)。
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: "~> v2"
          workdir: tools/atelier
          args: release --clean --skip=publish,validate
        env:
          GORELEASER_CURRENT_TAG: ${{ steps.version.outputs.version }}
      - name: Create GitHub Release and attach artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --verify-tag \
            --notes "atelier CLI のリリース。取得方法は tools/atelier/README.md を参照。" \
            dist/*.tar.gz dist/*.zip dist/checksums.txt

  # プラグイン同梱ピン(pin/version + pin/checksums.txt)を新リリースへ追従させる。
  # ピンは「レビュー済み commit = 信頼の根」(ADR 0003)なので main へ直 push せず、
  # 更新 PR を起こして人間マージで収束させる。公開済み Release の checksums.txt を
  # そのまま採用する(消費者が検証に使う値と同一)ため release ジョブに依存する。
  # 前提: リポジトリ設定「Allow GitHub Actions to create and approve pull requests」が有効。
  pin-update:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write # ピン更新ブランチの push に必要
      pull-requests: write # ピン更新 PR の作成に必要
    defaults:
      run:
        working-directory: . # 既定(tools/atelier)を上書き — ピンはリポジトリルート配下
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main # ピン更新は常に最新 main を base にする(タグ commit ではなく)
      - name: Derive semver from tag (atelier/vX.Y.Z -> X.Y.Z)
        id: version
        run: echo "version=${GITHUB_REF_NAME#atelier/v}" >> "$GITHUB_OUTPUT"
      - name: Download published checksums.txt from the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "$GITHUB_REF_NAME" --pattern checksums.txt --output /tmp/checksums.txt --clobber
      - name: Update bundled pin
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          printf '%s\n' "$VERSION" > plugins/atelier/pin/version
          cp /tmp/checksums.txt plugins/atelier/pin/checksums.txt
      # marketplace のタグピン(#163)も同じ追従 PR で更新する。
      # marketplace.json の source.ref がタグを指す限り、main への push は
      # plugin update の取得内容に影響しない(main マージとリリースの分離)。
      - name: Update marketplace tag pin
        run: |
          jq --arg ref "$GITHUB_REF_NAME" \
            '(.plugins[] | select(.name == "atelier") | .source.ref) = $ref' \
            .claude-plugin/marketplace.json > /tmp/marketplace.json
          mv /tmp/marketplace.json .claude-plugin/marketplace.json
      - name: Open pin-update PR if changed
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if git diff --quiet -- plugins/atelier/pin .claude-plugin/marketplace.json; then
            echo "ピンは既に v$VERSION と一致。PR は作成しない。"
            exit 0
          fi
          branch="pin-update/atelier-v$VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add plugins/atelier/pin/version plugins/atelier/pin/checksums.txt .claude-plugin/marketplace.json
          git commit -m "chore(atelier): bump bundled pin to v$VERSION"
          git push --force origin "$branch"
          if gh pr list --head "$branch" --state open --json number --jq 'length' | grep -qx 0; then
            gh pr create --base main --head "$branch" \
              --title "chore(atelier): bump bundled pin to v$VERSION" \
              --body "リリース \`$GITHUB_REF_NAME\` に合わせてプラグイン同梱ピン(\`plugins/atelier/pin/\`)と marketplace のタグピン(\`.claude-plugin/marketplace.json\` の source.ref、#163)を更新する自動 PR。マージで全マシンが新ピンへ収束し(ADR 0003)、plugin update の取得内容が新タグへ切り替わる。checksums.txt は公開 Release から取得した値。"
          else
            echo "既存の pin-update PR を更新した(新規作成はしない)。"
          fi
