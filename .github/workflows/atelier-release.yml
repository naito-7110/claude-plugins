name: atelier-release

on:
  push:
    tags:
      - "atelier/v*"

# supply-chain-security: トップレベルは無権限、必要なジョブにだけ最小権限を付与する。
permissions: {}

defaults:
  run:
    working-directory: tools/atelier

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # GitHub Release の作成・アセット添付に必要
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: tools/atelier/go.mod
          cache-dependency-path: tools/atelier/go.sum
      - name: Derive semver from tag (atelier/vX.Y.Z -> vX.Y.Z)
        id: version
        run: echo "version=${GITHUB_REF_NAME#atelier/}" >> "$GITHUB_OUTPUT"
      # goreleaser OSS はモノレポのタグ prefix(atelier/v*)を解釈できない
      # (Pro 機能)ため、同一コミットに semver のローカルタグを作って
      # GORELEASER_CURRENT_TAG で渡す。このタグは push しない(リモートに残らない)。
      - name: Create local semver tag for goreleaser
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: git tag -f "$VERSION"
      # publish は gh で行うため skip。validate はモノレポタグとローカルタグの
      # 併存を誤検知しうるため skip する(ビルド・checksum 生成には影響しない)。
      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          version: "~> v2"
          workdir: tools/atelier
          args: release --clean --skip=publish,validate
        env:
          GORELEASER_CURRENT_TAG: ${{ steps.version.outputs.version }}
      - name: Create GitHub Release and attach artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --verify-tag \
            --notes "atelier CLI のリリース。取得方法は tools/atelier/README.md を参照。" \
            dist/*.tar.gz dist/*.zip dist/checksums.txt
