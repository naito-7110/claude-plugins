# factory issue check — PR↔issue 整合のサーバー側ゲート(L3)。
#
# 判定の実体は factory バイナリ(pr verify)で、本 workflow は
# 「バイナリ取得 → 実行 → 結果」だけの薄い入口(hook #14 と同一ロジック保証)。
# branch protection の required status checks に "factory-issue-check" を
# 登録することで、クライアントを問わず不整合な PR のマージを止める。
#
# 注意: issue のラベルは PR イベントの外で変わるため、本チェックの green は
# 古くなりうる。マージ時の live 判定はクライアント側 hook が行い、
# 本チェックは defense-in-depth(全クライアントを縛る最終ライン)。
name: factory issue check

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, labeled, unlabeled]

permissions: {}

jobs:
  factory-issue-check:
    name: factory-issue-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download factory binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag=$(gh release list --repo naito-7110/claude-plugins \
            --json tagName --jq '[.[] | select(.tagName | startswith("factory/v"))][0].tagName')
          test -n "$tag" || { echo "factory のリリースが見つかりません"; exit 1; }
          gh release download "$tag" --repo naito-7110/claude-plugins \
            --pattern '*linux_amd64*' --pattern 'checksums.txt' --dir /tmp/factory-bin
          cd /tmp/factory-bin
          grep linux_amd64 checksums.txt | sha256sum --check -
          tar -xzf ./*linux_amd64*.tar.gz
          install -m 0755 factory /usr/local/bin/factory

      - name: Verify PR against linked issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # 依存マニフェスト検査の設定(.factory/checks.yml の dep_manifests)が
          # あれば有効化する。無ければスキップ(スタック確定前でも動く)
          args=()
          if [ -f .factory/checks.yml ]; then
            patterns=$(grep -E '^\s*-\s' .factory/checks.yml | sed -E 's/^\s*-\s*//' | paste -sd, -)
            [ -n "$patterns" ] && args+=(--dep-manifests "$patterns")
          fi
          factory pr verify --number "${{ github.event.pull_request.number }}" "${args[@]}"
